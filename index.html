async function dbGet(key, uid) {
  try {
    const userId = uid || (firebase.auth().currentUser && firebase.auth().currentUser.uid);
    if (!userId) return null;
    const doc = await firebase.firestore().collection("users").doc(userId).collection("data").doc(key).get();
    if (!doc.exists) return null;
    const val = doc.data().value;
    if (typeof val === "string") {
      try { return JSON.parse(val); } catch(e) { return val; }
    }
    return val;
  } catch(e) { console.error("dbGet error:", e); return null; }
}
async function dbSet(key, val, uid) {
  try {
    const userId = uid || (firebase.auth().currentUser && firebase.auth().currentUser.uid);

// 재료 배열을 개별 큐브 토큰으로 펼치기 (전역 인덱스 기준)
function ingredientsToTokens(ingredients) {
  let gi = 0;
  return ingredients.flatMap(ing =>
    Array.from({length: ing.cubeCount}, () => {
      const tokenKey = ing.name + "__g" + gi++;
      return { tokenKey, ingName: ing.name, ing };
    })
  );
}
// slotMap을 새 재료 목록 기준으로 tokenKey 재생성
function rebuildSlotMap(slotMap, ingredients) {
  let gi = 0;
  const newTokens = {};
  for (const ing of ingredients) {
    const name = ing.name.trim();
    if (!name) continue;
    const count = Number(ing.cubeCount) || 1;
    newTokens[name] = [];
    for (let i = 0; i < count; i++) {
      newTokens[name].push(name + "__g" + gi++);
    }
  }
  const ingUsed = {};
  const result = {};
  for (const [slot, tokenKeys] of Object.entries(slotMap||{})) {
    result[slot] = [];
    for (const tk of tokenKeys) {
      const ingName = tk.split("__g")[0];
      if (!ingUsed[ingName]) ingUsed[ingName] = 0;
      const idx = ingUsed[ingName];
      if (newTokens[ingName] && idx < newTokens[ingName].length) {
        result[slot].push(newTokens[ingName][idx]);
        ingUsed[ingName]++;
      }
    }
  }
  return result;
}


// 토큰 표시 레이블: 같은 이름이 여러 개면 (1/n) 표기
function tokenLabel(tokenKey, allTokens) {
  const ingName = tokenKey.split("__g")[0];
  const sameGroup = allTokens.filter(t => t.ingName === ingName);
  if (sameGroup.length <= 1) return ingName;
  const pos = sameGroup.findIndex(t => t.tokenKey === tokenKey) + 1;
  return ingName + " (" + pos + "/" + sameGroup.length + ")";
}

function cubeVolume(recipe, cubes) {
  return recipe.ingredients.reduce((sum, ing) => {
    const c = cubes.find(x => x.ingredient === ing.name);
    return sum + (Number(ing.cubeCount)||0) * (c ? Number(c.weightG)||0 : 0);
  }, 0);
}

function calcStock(cubes, schedules, recipes) {
  const used = {};
  schedules.forEach(s => {
    const rec = recipes.find(r => r.id === s.recipeId);
    if (rec) rec.ingredients.forEach(ing => { used[ing.name] = (used[ing.name]||0) + (Number(ing.cubeCount)||0); });
  });
  const stock = {};
  cubes.forEach(c => { stock[c.ingredient] = Math.max(0, c.count - (used[c.ingredient]||0)); });
  const status = {};
  recipes.forEach(r => {
    // 큐브에 등록된 재료 중 재고가 필요량보다 부족한 것
    const oos = r.ingredients.filter(ing => {
      const cube = cubes.find(c => c.ingredient === ing.name);
      if (!cube) return false; // 큐브 등록 안된 재료는 무시
      const needed = Number(ing.cubeCount) || 0;
      const avail = stock[ing.name] ?? 0;
      return avail < needed;
    });
    // 재료 부족이면 무조건 비활성화 (스케쥴 등록 여부 무관)
    status[r.id] = { disabled: oos.length > 0, outOfStock: oos.map(i=>i.name) };
  });
  return { stock, status };
}

function getWeekDates(base) {
  const d = new Date(base), dow = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate() - (dow===0 ? 6 : dow-1));
  return Array.from({length:7}, (_,i) => {
    const dd = new Date(mon); dd.setDate(mon.getDate()+i);
    return dd.toISOString().slice(0,10);
  });
}

          <span style={{fontWeight:700,fontSize:16,color:"#333"}}>{title}</span>
          <button onClick={onClose} style={{background:"#f0f0f0",border:"none",borderRadius:50,width:30,height:30,cursor:"pointer",fontSize:15,lineHeight:"30px",textAlign:"center"}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({ label, value, onChange, placeholder, type }) {
  return(
    <div style={{marginBottom:12}}>
      {label && <div style={{fontSize:12,color:"#888",marginBottom:4}}>{label}</div>}
      <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder||""} type={type||"text"}
        style={{width:"100%",padding:"10px 14px",border:"1.5px solid #e8e8e8",borderRadius:12,fontSize:14,outline:"none",boxSizing:"border-box",background:"#fafafa"}} />
    </div>
  );
}

function PillBtn({ children, onClick, color, small, outline, full, disabled }) {
  const bg = color || "#7BC67E";
  return(
    <button onClick={onClick} disabled={!!disabled}
      style={{background:outline?"transparent":bg,color:outline?bg:"#fff",border:"2px solid "+bg,borderRadius:12,
        padding:small?"6px 14px":"10px 20px",fontWeight:600,fontSize:small?12:14,
        cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.5:1,width:full?"100%":undefined}}>
      {children}
    </button>
  );
}

function SortBar({ options, value, onChange }) {
  return(
    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:14}}>
      {options.map(([val,label]) => (
        <button key={val} onClick={()=>onChange(val)}
          style={{padding:"4px 10px",borderRadius:20,cursor:"pointer",fontSize:11,fontWeight:value===val?700:400,
            border:"1.5px solid "+(value===val?"#7BC67E":"#e0e0e0"),
            background:value===val?"#7BC67E22":"#fff",color:value===val?"#4a9":"#888"}}>
          {label}
        </button>
      ))}
    </div>
  );
}

// 재료 검색 드롭다운
function IngSearch({ value, onChange, cubes }) {
  const [open, setOpen] = useState(false);
  const [q, setQ] = useState(value||"");
  const [hov, setHov] = useState(null);

  const allIngs = Array.from(new Set(cubes.map(c=>c.ingredient))).sort((a,b)=>a.localeCompare(b,"ko"));
  const filtered = q.trim() === "" ? allIngs : allIngs.filter(n=>n.includes(q));

  useEffect(() => { setQ(value||""); }, [value]);

  return(
    <div style={{position:"relative",flex:2}}>
      <input value={q}
        onChange={e => { setQ(e.target.value); onChange(e.target.value); setOpen(true); }}
        onFocus={() => setOpen(true)}
        onBlur={() => setTimeout(()=>setOpen(false), 150)}
        placeholder="재료 검색..."
        style={{width:"100%",padding:"8px 12px",border:"1.5px solid #e8e8e8",borderRadius:10,fontSize:13,outline:"none",background:"#fafafa",boxSizing:"border-box"}} />
      {open && (
        <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:300,background:"#fff",border:"1.5px solid #e8e8e8",borderRadius:10,boxShadow:"0 6px 20px rgba(0,0,0,0.1)",maxHeight:180,overflowY:"auto",marginTop:2}}>
          {filtered.length === 0 && (
            <div style={{padding:"8px 12px",fontSize:12,color:"#bbb"}}>직접 입력으로 추가 가능</div>
          )}
          {filtered.map(ing => (
            <div key={ing}
              onMouseDown={e => { e.preventDefault(); onChange(ing); setQ(ing); setOpen(false); }}
              onMouseEnter={() => setHov(ing)} onMouseLeave={() => setHov(null)}
              style={{padding:"8px 12px",fontSize:13,cursor:"pointer",borderBottom:"1px solid #f5f5f5",
                background:hov===ing?"#f0faf0":"#fff",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:"#333"}}>{ing}</span>
              <span style={{fontSize:10,color:"#aaa"}}>{(cubes.find(c=>c.ingredient===ing)||{}).count||0}개 재고</span>
            </div>
          ))}
          {q.trim() && !allIngs.includes(q.trim()) && (
            <div
              onMouseDown={e => { e.preventDefault(); onChange(q); setOpen(false); }}
              onMouseEnter={() => setHov("__new__")} onMouseLeave={() => setHov(null)}
              style={{padding:"8px 12px",fontSize:13,cursor:"pointer",fontWeight:600,color:"#7BC67E",
                borderTop:"1px solid #f0f0f0",background:hov==="__new__"?"#e8f8e8":"#f9fff9"}}>
              + "{q}" 직접 추가
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ────────────────────────────
// 레시피 탭
// ────────────────────────────
function RecipeTab({ recipes, setRecipes, cubes, recipeStatus, dishes, stock }) {
  const [modal, setModal] = useState(false);
  const [editId, setEditId] = useState(null);
  const emptyForm = { name:"", color:"#FFB347", note:"", ingredients:[{name:"",cubeCount:1}], dishId:"", slotMap:{} };
  const [form, setForm] = useState(emptyForm);
  const [sortBy, setSortBy] = useState("name_asc");
  const [hideDisabled, setHideDisabled] = useState(false);
  const [bannerOpen, setBannerOpen] = useState(false);
  const [favOnly, setFavOnly] = useState(false);

  const openNew = () => { setEditId(null); setForm(emptyForm); setModal(true); };
  const openEdit = r => { setEditId(r.id); setForm({name:r.name,color:r.color,note:r.note||"",ingredients:r.ingredients.map(x=>({...x})),dishId:r.dishId||"",slotMap:r.slotMap||{}}); setModal(true); };
  const openCopy = r => { setEditId(null); const newIngs=r.ingredients.map(x=>({...x})); setForm({name:r.name+" (복사)",color:r.color,note:r.note||"",ingredients:newIngs,dishId:r.dishId||"",slotMap:rebuildSlotMap(r.slotMap,newIngs)}); setModal(true); };

  const addIng = () => setForm(f => ({...f, ingredients:[...f.ingredients, {name:"",cubeCount:1}]}));
  const delIng = i => setForm(f => {
    const removed = f.ingredients[i];
    const newIngs = f.ingredients.filter((_,idx)=>idx!==i);
    // 삭제된 재료의 tokenKey를 slotMap에서도 제거하고 나머지는 재생성
    const newSlotMap = rebuildSlotMap(
      Object.fromEntries(Object.entries(f.slotMap||{}).map(([slot,tks])=>[slot, tks.filter(tk=>tk.split("__g")[0]!==removed.name)])),
      newIngs
    );
    return {...f, ingredients:newIngs, slotMap:newSlotMap};
  });
  const setIng = (i,k,v) => setForm(f => { const a=[...f.ingredients]; a[i]={...a[i],[k]:k==="cubeCount"?Number(v):v}; return {...f,ingredients:a}; });

  const save = () => {
    const ings = form.ingredients.filter(x=>x.name.trim()).map(x=>({...x,cubeCount:Number(x.cubeCount)||1}));
    if (!form.name || !ings.length) return;
    const cleanSlotMap = rebuildSlotMap(form.slotMap, ings);
    if (editId) {
      setRecipes(rs => rs.map(r => r.id===editId ? {...r,name:form.name,color:form.color,note:form.note,ingredients:ings,dishId:form.dishId,slotMap:cleanSlotMap,updatedAt:todayStr()} : r));
    } else {
      setRecipes(rs => [...rs, {id:uid(),name:form.name,color:form.color,note:form.note,ingredients:ings,dishId:form.dishId,slotMap:cleanSlotMap,updatedAt:todayStr()}]);
    }
    setModal(false);
  };

  const sorted = [...recipes].sort((a,b) => {
    if (sortBy==="fav") { if(b.favorite&&!a.favorite) return 1; if(a.favorite&&!b.favorite) return -1; return a.name.localeCompare(b.name,"ko"); }
    if (sortBy==="vol_desc") return cubeVolume(b,cubes)-cubeVolume(a,cubes);
    if (sortBy==="vol_asc")  return cubeVolume(a,cubes)-cubeVolume(b,cubes);
    if (sortBy==="name_asc") return a.name.localeCompare(b.name,"ko");
    if (sortBy==="name_desc") return b.name.localeCompare(a.name,"ko");
    return 0;
  }).filter(r => !hideDisabled || !(recipeStatus[r.id]||{}).disabled).filter(r => !favOnly || r.favorite);

  const disabledCount = recipes.filter(r => (recipeStatus[r.id]||{}).disabled).length;

  return(
    <div>
      {disabledCount > 0 && (
        <div style={{background:"#fff0f0",border:"1.5px solid #ffb3b3",borderRadius:12,padding:"10px 14px",marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13,color:"#c00",marginBottom:4}}>🚫 재료 소진으로 사용 불가: {disabledCount}개</div>
          <div style={{fontSize:11,color:"#e55"}}>
            {recipes.filter(r=>(recipeStatus[r.id]||{}).disabled).map(r=>(
              <span key={r.id} style={{marginRight:8}}>{r.name} ({(recipeStatus[r.id]||{outOfStock:[]}).outOfStock.join(",")} 없음)</span>
            ))}
          </div>
        </div>
      )}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <span style={{fontWeight:700,fontSize:16,color:"#333"}}>레시피 목록 ({recipes.length})</span>
        <PillBtn onClick={openNew} small>+ 레시피 추가</PillBtn>
      </div>
      <div style={{marginBottom:8}}>
        <button onClick={()=>setFavOnly(v=>!v)}
          style={{padding:"5px 14px",borderRadius:20,border:"1.5px solid "+(favOnly?"#f9a825":"#e0e0e0"),
            background:favOnly?"#fef08a":"#fff",color:favOnly?"#b45309":"#888",
            fontSize:12,cursor:"pointer",fontWeight:favOnly?700:400}}>
          {favOnly?"⭐ 즐겨찾기만 보기":"☆ 즐겨찾기만 보기"}
        </button>
      </div>
      <SortBar value={sortBy} onChange={setSortBy}
        options={[["name_asc","가나다순"],["name_desc","가나다 역순"],["vol_desc","용량 많은순"],["vol_asc","용량 적은순"]]} />
      {disabledCount>0 && (
        <div style={{marginBottom:8}}>
          <button onClick={()=>setHideDisabled(v=>!v)}
            style={{padding:"5px 14px",borderRadius:20,border:"1.5px solid "+(hideDisabled?"#7BC67E":"#e0e0e0"),
              background:hideDisabled?"#e8f8f0":"#fff",color:hideDisabled?"#4a9":"#888",
              fontSize:12,cursor:"pointer",fontWeight:hideDisabled?700:400}}>
            {hideDisabled?`✅ 재료없음 숨기는 중 (${disabledCount}개)`:`🚫 재료없음 ${disabledCount}개 숨기기`}
          </button>
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {sorted.map(r => {
          const st = recipeStatus[r.id] || {disabled:false,outOfStock:[]};
          const vol = cubeVolume(r, cubes);
          const totalC = r.ingredients.reduce((s,x)=>s+(Number(x.cubeCount)||0),0);
          return(
            <div key={r.id} style={{background:st.disabled?"#fdf5f5":"#fff",borderRadius:16,padding:16,borderLeft:"4px solid "+(st.disabled?"#ffb3b3":r.color),boxShadow:"0 2px 12px rgba(0,0,0,0.04)",position:"relative",overflow:"hidden"}}>
              {st.disabled && <div style={{position:"absolute",top:0,right:0,background:"#e55",color:"#fff",fontSize:10,fontWeight:700,padding:"3px 12px",borderBottomLeftRadius:10}}>재료 없음</div>}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1,paddingRight:st.disabled?50:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8,flexWrap:"wrap"}}>
                    <span style={{fontWeight:700,fontSize:15,color:st.disabled?"#999":r.favorite?"#b45309":"#333"}}>{st.disabled&&"🚫 "}{r.favorite&&<span style={{marginRight:3}}>⭐</span>}{r.name}</span>
                    <span style={{background:(st.disabled?"#ddd":r.color)+"22",border:"1px solid "+(st.disabled?"#ddd":r.color)+"66",borderRadius:20,padding:"1px 8px",fontSize:11,color:st.disabled?"#bbb":"#555",fontWeight:600}}>🧊 {totalC}개</span>
                    {vol>0 && <span style={{background:st.disabled?"#f5f5f5":"#e8f8f0",border:"1px solid "+(st.disabled?"#ddd":"#ade"),borderRadius:20,padding:"1px 8px",fontSize:11,color:st.disabled?"#bbb":"#4a9",fontWeight:600}}>💧 {vol}g</span>}
                  </div>
                  <div style={{marginBottom:4}}>
                    {r.ingredients.map(ing => {
                      const oos = st.outOfStock.includes(ing.name);
                      const cube = cubes.find(c=>c.ingredient===ing.name);
                      const avail = cube ? (stock[ing.name]??0) : null;
                      const needed = Number(ing.cubeCount)||0;
                      const shortage = oos && avail!==null ? needed - avail : 0;
                      return(
                        <span key={ing.name} style={{display:"inline-flex",alignItems:"center",gap:3,background:oos?"#fff0f0":(st.disabled?"#f5f5f5":r.color+"18"),border:"1px solid "+(oos?"#ffb3b3":(st.disabled?"#e0e0e0":r.color+"55")),borderRadius:20,padding:"2px 8px",marginRight:5,marginBottom:4,fontSize:11}}>
                          {oos && <span style={{fontSize:10}}>⚠️</span>}
                          <span style={{color:oos?"#e55":"#555"}}>{ing.name}</span>
                          <span style={{fontWeight:700,color:oos?"#e55":(st.disabled?"#bbb":r.color)}}>x{ing.cubeCount}</span>
                          {oos && <span style={{fontSize:9,color:"#e55",fontWeight:700}}>{shortage>0?shortage+"개 부족":"소진"}</span>}
                        </span>
                      );
                    })}
                  </div>
                  {st.disabled && <div style={{marginTop:6,background:"#fff0f0",borderRadius:8,padding:"5px 10px",fontSize:11,color:"#e55",fontWeight:600}}>🚫 재고 없음: <strong>{st.outOfStock.join(", ")}</strong></div>}
                  {r.note && <div style={{fontSize:12,color:"#999",marginTop:4}}>{r.note}</div>}
                  {r.dishId && (()=>{const d=(dishes||[]).find(x=>x.id===r.dishId);return d?<div style={{fontSize:11,color:"#7a9",marginTop:4,display:"flex",alignItems:"center",gap:4}}><span>{d.icon}</span><span>{d.name}</span></div>:null;})()}
                  {r.updatedAt && <div style={{fontSize:10,color:"#bbb",marginTop:4}}>✏️ 수정: {r.updatedAt}</div>}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:5,marginLeft:8,flexShrink:0}}>
                  <button onClick={()=>setRecipes(rs=>rs.map(x=>x.id===r.id?{...x,favorite:!x.favorite}:x))}
                    style={{background:r.favorite?"#fef08a":"#f5f5f5",border:"1.5px solid "+(r.favorite?"#f9a825":"#e0e0e0"),
                      borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:16,lineHeight:1}}>
                    {r.favorite?"⭐":"☆"}
                  </button>
                  <button onClick={()=>openEdit(r)} style={{background:"#f5f5f5",border:"none",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:12,color:"#666"}}>수정</button>
                  <button onClick={()=>openCopy(r)} style={{background:"#e8f8f0",border:"none",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:12,color:"#4a9"}}>복사</button>
                  <button onClick={()=>setRecipes(rs=>rs.filter(x=>x.id!==r.id))} style={{background:"#ffeaea",border:"none",borderRadius:8,padding:"4px 10px",cursor:"pointer",fontSize:12,color:"#e87"}}>삭제</button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      <Overlay open={modal} onClose={()=>setModal(false)} title={editId?"레시피 수정":"새 레시피 추가"}>
        <Field label="레시피 이름" value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="단호박 죽" />
        <Field label="메모" value={form.note} onChange={v=>setForm(f=>({...f,note:v}))} placeholder="특이사항 등" />
        <div style={{marginBottom:12}}>
          <div style={{fontSize:12,color:"#888",marginBottom:4}}>색상</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {RECIPE_COLORS.map(c => (
              <div key={c} onClick={()=>setForm(f=>({...f,color:c}))} style={{width:28,height:28,borderRadius:50,background:c,cursor:"pointer",border:form.color===c?"3px solid #333":"3px solid transparent"}} />
            ))}
          </div>
        </div>
        <div style={{marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:12,color:"#888"}}>재료 & 큐브 수</div>
            <button onClick={addIng} style={{background:"#f0f0f0",border:"none",borderRadius:8,padding:"3px 10px",cursor:"pointer",fontSize:12,color:"#666"}}>+ 추가</button>
          </div>
          {form.ingredients.map((ing,i) => (
            <div key={i} style={{display:"flex",gap:6,marginBottom:6,alignItems:"center"}}>
              <IngSearch value={ing.name} onChange={v=>setIng(i,"name",v)} cubes={cubes} />
              <input value={ing.cubeCount} onChange={e=>setIng(i,"cubeCount",e.target.value)} type="number" min="1"
                style={{width:50,padding:"8px",border:"1.5px solid #e8e8e8",borderRadius:10,fontSize:13,outline:"none",background:"#fafafa",textAlign:"center"}} />
              <span style={{fontSize:11,color:"#aaa",flexShrink:0}}>개</span>
              {form.ingredients.length>1 && (
                <button onClick={()=>delIng(i)} style={{background:"#ffeaea",border:"none",borderRadius:8,padding:"4px 8px",cursor:"pointer",fontSize:12,color:"#e87",flexShrink:0}}>✕</button>
              )}
            </div>
          ))}
        </div>
        {/* 식기 & 칸 배치 */}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:12,color:"#888",marginBottom:6}}>식기 지정 <span style={{fontSize:11,color:"#bbb",fontWeight:400}}>(선택사항)</span></div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
            <div onClick={()=>setForm(f=>({...f,dishId:"",slotMap:{}}))}
              style={{padding:"4px 12px",borderRadius:20,cursor:"pointer",fontSize:12,background:!form.dishId?"#7BC67E22":"#f5f5f5",border:"1.5px solid "+(!form.dishId?"#7BC67E":"transparent"),fontWeight:!form.dishId?700:400,color:"#555"}}>
              없음
            </div>
            {(dishes||[]).map(d=>(
              <div key={d.id} onClick={()=>setForm(f=>({...f,dishId:d.id,slotMap:{}}))}
                style={{padding:"4px 12px",borderRadius:20,cursor:"pointer",fontSize:12,background:form.dishId===d.id?"#7BC67E22":"#f5f5f5",border:"1.5px solid "+(form.dishId===d.id?"#7BC67E":"transparent"),fontWeight:form.dishId===d.id?700:400,color:"#444",display:"flex",alignItems:"center",gap:4}}>
                <span>{d.icon}</span><span>{d.name}</span>
              </div>
            ))}
          </div>
          {form.dishId && (()=>{
            const dish = (dishes||[]).find(d=>d.id===form.dishId);
            if (!dish) return null;
            const ings = form.ingredients.filter(x=>x.name.trim()).map(x=>({...x,cubeCount:Number(x.cubeCount)||1}));
            if (ings.length===0) return <div style={{fontSize:11,color:"#bbb"}}>재료를 먼저 추가하세요</div>;
            return(
              <div style={{background:"#f9f9f9",borderRadius:14,padding:12}}>
                <div style={{fontSize:11,color:"#888",marginBottom:8,fontWeight:600}}>{dish.icon} {dish.name} — 재료를 각 칸에 배치하세요</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat("+Math.min(dish.slots.length,3)+",1fr)",gap:6}}>
                  {(()=>{
                    // 재료를 cubeCount만큼 개별 토큰으로 펼치기
                    const tokens = ingredientsToTokens(ings);
                    const allSlotKeys = dish.slots.flatMap(s=>form.slotMap[s]||[]);
                    return dish.slots.map((slot,si)=>{
                      const slotKeys = form.slotMap[slot]||[];
                      return(
                        <div key={slot} style={{borderRadius:10,border:"2px solid "+SLOT_COLORS[si],background:"#fff",padding:"8px 6px"}}>
                          <div style={{fontSize:10,fontWeight:700,textAlign:"center",marginBottom:6,color:"#555",background:SLOT_COLORS[si],borderRadius:6,padding:"2px 4px"}}>{slot}</div>
                          {tokens.map(tok=>{
                            const checked = slotKeys.includes(tok.tokenKey);
                            // 다른 칸에 배치된 개수 + 이 칸에 배치된 개수 = 총 cubeCount면 차단
                            const usedCount = allSlotKeys.filter(k=>k===tok.tokenKey).length;
                            const inOtherSlot = !checked && dish.slots.some(s=>s!==slot&&(form.slotMap[s]||[]).includes(tok.tokenKey));
                            const maxReached = !checked && usedCount >= 1; // 토큰은 1개짜리이므로 1개 사용되면 차단
                            const blocked = inOtherSlot || maxReached;
                            return(
                              <div key={slot+"-"+tok.tokenKey}
                                onClick={()=>{
                                  if(blocked) return;
                                  setForm(f=>{
                                    const cur = f.slotMap[slot]||[];
                                    const next = cur.includes(tok.tokenKey)?cur.filter(x=>x!==tok.tokenKey):[...cur,tok.tokenKey];
                                    return {...f,slotMap:{...f.slotMap,[slot]:next}};
                                  });
                                }}
                                style={{display:"flex",alignItems:"center",gap:4,cursor:blocked?"not-allowed":"pointer",padding:"4px 6px",borderRadius:8,marginBottom:3,
                                  background:checked?form.color+"33":blocked?"#f0f0f0":"transparent",
                                  opacity:blocked&&!checked?0.4:1}}>
                                <span style={{width:12,height:12,borderRadius:3,flexShrink:0,border:"2px solid "+(checked?form.color:blocked?"#ddd":"#ccc"),background:checked?form.color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>
                                  {checked&&<span style={{color:"#fff",fontSize:8,fontWeight:700}}>✓</span>}
                                </span>
                                <span style={{fontSize:10,color:blocked&&!checked?"#bbb":"#444"}}>
                                  {tokenLabel(tok.tokenKey, tokens)}
                                </span>
                              </div>
                            );
                          })}
                        </div>
                      );
                    });
                  })()}
                </div>
                <div style={{fontSize:10,color:"#bbb",marginTop:6}}>* 같은 재료는 한 칸에만 배치 가능해요</div>
              </div>
            );
          })()}
        </div>
        <PillBtn onClick={save} full>저장</PillBtn>
      </Overlay>
    </div>
  );
}

// ────────────────────────────
// 스케줄 탭
// ────────────────────────────
function ScheduleTab({ recipes, schedules, setSchedules, cubes, dishes, recipeStatus }) {
  const [weekBase, setWeekBase] = useState(todayStr());
  const [modal, setModal] = useState(false);
  const [target, setTarget] = useState({date:"",meal:""});
  const [form, setForm] = useState({recipeId:"",dishId:"",amount:"",memo:"",checked:[],slots:{}});
  const [rdrop, setRdrop] = useState(false);
  const [ddrop, setDdrop] = useState(false);
  const [rdropSearch, setRdropSearch] = useState("");
  const [editSlots, setEditSlots] = useState(false); // 이번만 슬롯 수정 모드

  const [dayView, setDayView] = useState(todayStr());
  const [bannerOpen, setBannerOpen] = useState(false);
  const weekDates = getWeekDates(weekBase);
  const today = todayStr();
  const getEntry = (date, meal) => schedules.find(s=>s.date===date&&s.meal===meal);

  const openCell = (date, meal) => {
    const ex = getEntry(date, meal);
    const rId = ex ? (ex.recipeId||"") : "";
    const nowDisabled = rId && (recipeStatus[rId]||{}).disabled;
    setTarget({date,meal});
    const defRec = rId && !nowDisabled ? recipes.find(r=>r.id===rId) : null;
    const rawSlots = ex && ex.slots && Object.keys(ex.slots).length>0 ? ex.slots : (defRec&&defRec.slotMap ? defRec.slotMap : {});
    const defSlots = defRec ? rebuildSlotMap(rawSlots, defRec.ingredients) : rawSlots;
    const defDish  = ex ? (ex.dishId||"") : (defRec&&defRec.dishId ? defRec.dishId : "");
    setForm(ex
      ? {recipeId:nowDisabled?"":rId,dishId:defDish,amount:ex.amount||"",memo:ex.memo||"",checked:ex.checked||[],slots:defSlots}
      : {recipeId:"",dishId:"",amount:"",memo:"",checked:[],slots:{}}
    );
    setRdrop(false); setDdrop(false); setEditSlots(false);
    setModal(true);
  };

  const pickRecipe = (id, recipeList) => {
    if ((recipeStatus[id]||{}).disabled) return;
    const rec = (recipeList||recipes).find(r=>r.id===id);
    // slotMap을 항상 현재 재료 기준으로 재생성해서 인덱스 불일치 방지
    const cleanSlots = rec && rec.slotMap ? rebuildSlotMap(rec.slotMap, rec.ingredients) : {};
    setForm(f=>({...f,recipeId:id,checked:[],slots:cleanSlots,dishId:rec&&rec.dishId?rec.dishId:""}));
    setRdrop(false);
  };
  const pickDish = id => {
    const newDish = dishes.find(d=>d.id===id);
    const rec = recipes.find(r=>r.id===form.recipeId);
    let newSlots = {};
    if (newDish && rec && rec.slotMap && Object.keys(rec.slotMap).length>0) {
      // 레시피 slotMap을 새 식기 슬롯 기준으로 재매핑
      const rebuit = rebuildSlotMap(rec.slotMap, rec.ingredients);
      // 새 식기에 있는 슬롯만 유지
      newDish.slots.forEach(slot => { if (rebuit[slot]) newSlots[slot] = rebuit[slot]; });
    }
    setForm(f=>({...f,dishId:id,slots:newSlots}));
    setDdrop(false);
  };
  const toggleCheck = name => setForm(f=>({...f,checked:f.checked.includes(name)?f.checked.filter(x=>x!==name):[...f.checked,name]}));
  const toggleSlot = (slot, name) => setForm(f=>{
    const cur = (f.slots[slot]||[]);
    return {...f,slots:{...f.slots,[slot]:cur.includes(name)?cur.filter(x=>x!==name):[...cur,name]}};
  });

  const saveEntry = () => {
    if (!form.recipeId || (recipeStatus[form.recipeId]||{}).disabled) return;
    setSchedules(ss=>[...ss.filter(s=>!(s.date===target.date&&s.meal===target.meal)), {id:uid(),date:target.date,meal:target.meal,...form}]);
    setModal(false);
  };
  const delEntry = () => { setSchedules(ss=>ss.filter(s=>!(s.date===target.date&&s.meal===target.meal))); setModal(false); };

  const selRec = recipes.find(r=>r.id===form.recipeId);
  const selDish = dishes.find(d=>d.id===form.dishId);
  const disabledCount = Object.values(recipeStatus).filter(s=>s.disabled).length;

  return(
    <div>
      {disabledCount>0 && (
        <div style={{background:"#fff0f0",border:"1.5px solid #ffb3b3",borderRadius:12,marginBottom:14,overflow:"hidden"}}>
          <div onClick={()=>setBannerOpen(v=>!v)}
            style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px",cursor:"pointer"}}>
            <span style={{fontWeight:700,fontSize:13,color:"#c00"}}>🚫 재료 소진 {disabledCount}개</span>
            <span style={{fontSize:11,color:"#e55"}}>{bannerOpen?"▲ 닫기":"▼ 목록 보기"}</span>
          </div>
          {bannerOpen && (
            <div style={{fontSize:11,color:"#e55",padding:"0 14px 10px",lineHeight:1.8}}>
              {recipes.filter(r=>(recipeStatus[r.id]||{}).disabled).map(r=>(
                <span key={r.id} style={{marginRight:8,display:"inline-block"}}>{r.name} ({(recipeStatus[r.id]||{}).outOfStock.join(", ")} 없음)</span>
              ))}
            </div>
          )}
        </div>
      )}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <button onClick={()=>{const d=new Date(weekBase);d.setDate(d.getDate()-7);setWeekBase(d.toISOString().slice(0,10));}} style={{background:"#f0f0f0",border:"none",borderRadius:10,padding:"6px 14px",cursor:"pointer",fontSize:18}}>&#8249;</button>
        <span style={{fontWeight:700,color:"#333",fontSize:14}}>{fmtMD(weekDates[0])} ~ {fmtMD(weekDates[6])}</span>
        <button onClick={()=>{const d=new Date(weekBase);d.setDate(d.getDate()+7);setWeekBase(d.toISOString().slice(0,10));}} style={{background:"#f0f0f0",border:"none",borderRadius:10,padding:"6px 14px",cursor:"pointer",fontSize:18}}>&#8250;</button>
      </div>
      <div style={{overflowX:"auto",marginBottom:14}}>
        <div style={{minWidth:520}}>
          <div style={{display:"grid",gridTemplateColumns:"48px repeat(7,1fr)",gap:3,marginBottom:4}}>
            <div/>
            {weekDates.map((d,i) => (
              <div key={d} onClick={()=>setDayView(d)}
                style={{textAlign:"center",fontSize:11,fontWeight:700,color:d===today?"#7BC67E":i>=5?"#E78F8F":"#888",padding:"4px 0",cursor:"pointer",background:dayView===d?"#e8f8f0":"transparent",borderRadius:8}}>
                {WEEKDAYS[i]}<br/><span style={{fontSize:13,color:d===today?"#7BC67E":"#555"}}>{fmtMD(d).slice(3)}</span>
              </div>
            ))}
          </div>
          {MEALS.map(meal => (
            <div key={meal} style={{display:"grid",gridTemplateColumns:"48px repeat(7,1fr)",gap:3,marginBottom:3}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:"#777",background:MEAL_BG[meal],borderRadius:10,flexDirection:"column",padding:"4px 0"}}>
                <span style={{fontSize:13}}>{MEAL_ICON[meal]}</span>{meal}
              </div>
              {weekDates.map(d => {
                const ent = getEntry(d, meal);
                const rec = ent ? recipes.find(r=>r.id===ent.recipeId) : null;
                const dis = rec && (recipeStatus[rec.id]||{}).disabled;
                const vol = rec ? cubeVolume(rec,cubes) : 0;
                const entSlotTokens = ent && ent.slots ? Object.values(ent.slots).flat() : [];
                const entChecked = ent && ent.checked ? ent.checked : [];
                // 슬롯 있으면 슬롯 토큰 기준, 없으면 checked 자체 기준
                const entTokens = entSlotTokens.length>0 ? entSlotTokens : (rec ? ingredientsToTokens(rec.ingredients).map(t=>t.tokenKey) : []);
                const checkedInTokens = entTokens.filter(tk=>entChecked.includes(tk));
                const allDone = entTokens.length>0 && checkedInTokens.length===entTokens.length;
                const partDone = entTokens.length>0 && checkedInTokens.length>0 && !allDone;
                return(
                  <div key={d} onClick={()=>openCell(d,meal)}
                    style={{minHeight:72,borderRadius:10,cursor:"pointer",padding:4,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",
                      background:d===dayView?(rec?rec.color+"44":"#e8f8f0"):(dis?"#fff5f5":rec?rec.color+"22":"#f9f9f9"),
                      border:d===dayView?"2px solid #7BC67E":(dis?"1.5px solid #ffb3b3":rec?"1.5px solid "+rec.color+"55":"1.5px dashed #e0e0e0")}}>
                    {rec ? (
                      <div style={{textAlign:"center"}}>
                        {dis && <div style={{fontSize:9,color:"#e55",fontWeight:700}}>🚫재료없음</div>}
                        <div style={{fontSize:10,fontWeight:700,color:dis?"#c88":"#444",lineHeight:1.3}}>{rec.name}</div>
                        {vol>0 && <div style={{fontSize:9,color:"#4a9",marginTop:1}}>{vol}g</div>}
                        {allDone && !dis && <div style={{fontSize:9,color:"#4a9",fontWeight:700,marginTop:1}}>✓완료</div>}
                        {partDone && !dis && <div style={{fontSize:9,color:"#f90",fontWeight:700,marginTop:1}}>⚠부족</div>}
                      </div>
                    ) : <div style={{color:"#ccc",fontSize:18}}>+</div>}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>

      {/* 일별 식단 */}
      <div style={{fontWeight:700,fontSize:14,color:"#333",marginBottom:8}}>{fmtMD(dayView)} 식단</div>
      {MEALS.map(meal=>{
        const ent = getEntry(dayView, meal);
        const rec = ent ? recipes.find(r=>r.id===ent.recipeId) : null;
        const dis = rec && (recipeStatus[rec.id]||{}).disabled;
        const dish = ent ? dishes.find(d=>d.id===ent.dishId) : null;
        const rawSlots = ent && ent.slots && Object.values(ent.slots).flat().length>0 ? ent.slots : (rec && rec.slotMap ? rec.slotMap : {});
        const slots = rec ? rebuildSlotMap(rawSlots, rec.ingredients) : rawSlots;
        const hasSlots = dish && dish.slots && dish.slots.length>0;
        const allIngNames = rec ? rec.ingredients.map(i=>i.name) : [];
        const checked = ent && ent.checked ? ent.checked : [];
        // tokenKey 기준으로 체크 (모달과 동일하게)
        const toggleDayCheck = (tokenKey) => {
          const newChecked = checked.includes(tokenKey) ? checked.filter(x=>x!==tokenKey) : [...checked,tokenKey];
          setSchedules(ss=>ss.map(s=>s.date===dayView&&s.meal===meal ? {...s,checked:newChecked} : s));
        };
        // 슬롯 있으면 슬롯 토큰 기준, 없으면 ingredientsToTokens 기준
        const slotTokensList = Object.values(ent&&ent.slots ? ent.slots : {}).flat();
        const allTokens = slotTokensList.length>0
          ? slotTokensList
          : (rec ? ingredientsToTokens(rec.ingredients).map(t=>t.tokenKey) : []);
        const totalTokens = allTokens.length;
        const checkedInSlot = allTokens.filter(tk=>checked.includes(tk));
        const isAllChecked = totalTokens > 0 && checkedInSlot.length === totalTokens;
        const isPartialChecked = totalTokens > 0 && checkedInSlot.length > 0 && !isAllChecked;
        return(
          <div key={meal} style={{background:ent?(dis?"#fff0f0":rec?rec.color+"18":"#f9f9f9"):"#f9f9f9",
            border:"1.5px solid "+(ent?(dis?"#ffb3b3":rec?rec.color+"66":"#e0e0e0"):"#e8e8e8"),
            borderRadius:14,marginBottom:8,overflow:"hidden"}}>
            <div onClick={()=>openCell(dayView,meal)}
              style={{display:"flex",alignItems:"center",gap:8,padding:"12px 16px",cursor:"pointer",borderBottom:ent?"1px solid "+(rec?rec.color+"33":"#eee"):"none"}}>
              <span style={{fontSize:18}}>{MEAL_ICON[meal]}</span>
              <span style={{fontWeight:700,fontSize:13,color:"#555"}}>{meal}</span>
              {ent && rec && <span style={{fontWeight:700,fontSize:14,color:dis?"#e55":rec.color}}>{dis&&"🚫 "}{rec.name}</span>}
              {!ent && <span style={{fontSize:12,color:"#bbb"}}>+ 추가</span>}
              {dish && <span style={{fontSize:11,color:"#777"}}>{dish.icon} {dish.name}</span>}
              {ent && rec && isAllChecked && <span style={{marginLeft:"auto",fontSize:11,fontWeight:700,color:"#4a9",background:"#e8f8f0",borderRadius:20,padding:"2px 8px"}}>✓ 완료</span>}
              {ent && rec && isPartialChecked && <span style={{marginLeft:"auto",fontSize:11,fontWeight:700,color:"#f90",background:"#fff8e1",borderRadius:20,padding:"2px 8px"}}>⚠ 부족</span>}
            </div>
            {ent && ent.memo && (
              <div style={{fontSize:12,color:"#666",padding:"6px 14px",background:"#fffde7",borderBottom:"1px solid #fff3cd",display:"flex",alignItems:"center",gap:6}}>
                <span style={{flexShrink:0}}>📝</span>
                <span style={{flex:1}}>{ent.memo}</span>
              </div>
            )}
            {ent && rec && (
              <div style={{padding:"10px 16px"}}>
                {hasSlots && Object.values(slots).flat().length>0 ? (
                  dish.slots.map((slot,si)=>{
                    const slotTokens = (slots[slot]||[]);
                    const tokensToShow = slotTokens.map(tk=>{
                      const ingName = tk.split("__g")[0];
                      const ing = rec.ingredients.find(x=>x.name===ingName);
                      return ing ? {tokenKey:tk, ingName} : null;
                    }).filter(Boolean);
                    if(tokensToShow.length===0) return null;
                    // 슬롯 전체 토큰으로 tokenLabel 계산
                    const allDaySlotTokenObjs = Object.values(slots).flat().map(tk=>({tokenKey:tk,ingName:tk.split("__g")[0]}));
                    const slotAllChecked = tokensToShow.every(t=>checked.includes(t.tokenKey));
                    return(
                      <div key={slot} style={{marginBottom:8,borderRadius:12,border:"1.5px solid "+(slotAllChecked?"#7BC67E":"#e0e0e0"),overflow:"hidden"}}>
                        <div style={{background:slotAllChecked?"#e8f8f0":"#f5f5f5",padding:"5px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <span style={{fontSize:11,fontWeight:700,color:"#555"}}>📌 {slot}</span>
                          <span style={{fontSize:11,color:slotAllChecked?"#4a9":"#aaa",fontWeight:600}}>
                            {tokensToShow.filter(t=>checked.includes(t.tokenKey)).length}/{tokensToShow.length}
                          </span>
                        </div>
                        <div style={{padding:"8px 10px",display:"flex",flexWrap:"wrap",gap:6}}>
                          {tokensToShow.map(({tokenKey,ingName})=>(
                            <label key={tokenKey} onClick={e=>e.stopPropagation()}
                              style={{display:"flex",alignItems:"center",gap:4,background:checked.includes(tokenKey)?"#e8f8f0":"#fff",
                                border:"1px solid "+(checked.includes(tokenKey)?"#7BC67E":"#ddd"),
                                borderRadius:20,padding:"4px 10px",cursor:"pointer",fontSize:12}}>
                              <input type="checkbox" checked={checked.includes(tokenKey)} onChange={()=>toggleDayCheck(tokenKey)}
                                style={{cursor:"pointer",accentColor:"#7BC67E"}}/>
                              {tokenLabel(tokenKey, allDaySlotTokenObjs)}
                            </label>
                          ))}
                        </div>
                      </div>
                    );
                  })
                ) : allIngNames.length>0 ? (
                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:"#888",marginBottom:6}}>재료 체크</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {ingredientsToTokens(rec.ingredients).map(({tokenKey,ingName})=>{
                        const allToks = ingredientsToTokens(rec.ingredients);
                        const label = tokenLabel(tokenKey, allToks);
                        return(
                          <label key={tokenKey} onClick={e=>e.stopPropagation()}
                            style={{display:"flex",alignItems:"center",gap:4,background:checked.includes(tokenKey)?"#e8f8f0":"#f5f5f5",
                              border:"1px solid "+(checked.includes(tokenKey)?"#7BC67E":"#ddd"),
                              borderRadius:20,padding:"3px 10px",cursor:"pointer",fontSize:12}}>
                            <input type="checkbox" checked={checked.includes(tokenKey)} onChange={()=>toggleDayCheck(tokenKey)}
                              style={{cursor:"pointer",accentColor:"#7BC67E"}}/>
                            {label}
                          </label>
                        );
                      })}
                    </div>
                  </div>
                ) : null}

              </div>
            )}
          </div>
        );
      })}

      <Overlay open={modal} onClose={()=>setModal(false)} wide title={target.date ? fmtFull(target.date)+" "+MEAL_ICON[target.meal]+" "+target.meal : ""}>
        {/* 레시피 선택 */}
        <div style={{marginBottom:12,position:"relative"}}>
          <div style={{fontSize:12,color:"#888",marginBottom:5}}>레시피 선택</div>
          <div onClick={()=>{setRdrop(o=>{if(!o)setRdropSearch("");return !o;});setDdrop(false);}} style={{padding:"10px 14px",border:"1.5px solid #e8e8e8",borderRadius:12,cursor:"pointer",background:"#fafafa",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            {selRec ? (
              <span style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{width:10,height:10,borderRadius:"50%",background:selRec.color,display:"inline-block"}} />
                <span style={{fontWeight:600,fontSize:14,color:"#333"}}>{selRec.name}</span>
              </span>
            ) : <span style={{color:"#bbb",fontSize:14}}>레시피를 선택하세요</span>}
            <span style={{color:"#aaa"}}>{rdrop?"▲":"▼"}</span>
          </div>
          {rdrop && (
            <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:200,background:"#fff",border:"1.5px solid #e8e8e8",borderRadius:12,boxShadow:"0 8px 24px rgba(0,0,0,0.1)",overflow:"hidden",marginTop:4}}>
              <div style={{padding:"8px 10px",borderBottom:"1px solid #f0f0f0"}}>
                <input autoFocus value={rdropSearch} onChange={e=>setRdropSearch(e.target.value)}
                  placeholder="레시피 검색..." onClick={e=>e.stopPropagation()}
                  style={{width:"100%",padding:"6px 10px",border:"1.5px solid #e0e0e0",borderRadius:8,fontSize:13,outline:"none",boxSizing:"border-box"}}/>
              </div>
              {(()=>{
                const filtered = [...recipes].filter(r=>r.name.includes(rdropSearch));
                const favs = filtered.filter(r=>r.favorite).sort((a,b)=>a.name.localeCompare(b.name,"ko"));
                const others = filtered.filter(r=>!r.favorite).sort((a,b)=>a.name.localeCompare(b.name,"ko"));
                const showFav = !rdropSearch && favs.length>0;
                const showAll = !rdropSearch && favs.length>0 && others.length>0;
                const list = rdropSearch ? filtered.sort((a,b)=>a.name.localeCompare(b.name,"ko")) : [...favs,...others];
                return (<>
                  {showFav && <div style={{padding:"4px 14px",fontSize:10,fontWeight:700,color:"#f9a825",background:"#fffde7",borderBottom:"1px solid #fff9c4"}}>⭐ 즐겨찾기</div>}
                  {list.map((r,ri)=>{
                    const st = recipeStatus[r.id]||{disabled:false,outOfStock:[]};
                    const vol = cubeVolume(r,cubes);
                    const totalC = r.ingredients.reduce((s,x)=>s+(Number(x.cubeCount)||0),0);
                    return(<React.Fragment key={r.id}>
                      {showAll && ri===favs.length && <div style={{padding:"4px 14px",fontSize:10,fontWeight:700,color:"#999",background:"#fafafa",borderBottom:"1px solid #f0f0f0"}}>전체 레시피</div>}
                      <div onClick={e=>{e.stopPropagation();pickRecipe(r.id,recipes);}}
                        style={{padding:"12px 14px",cursor:st.disabled?"not-allowed":"pointer",display:"flex",alignItems:"center",gap:8,
                          background:st.disabled?"#fdf5f5":form.recipeId===r.id?r.color+"22":"#fff",
                          borderBottom:"1px solid #f5f5f5",opacity:st.disabled?0.65:1}}>
                        <span style={{width:12,height:12,borderRadius:"50%",background:st.disabled?"#ccc":r.color,flexShrink:0}} />
                        <span style={{flex:1}}>
                          <span style={{fontWeight:form.recipeId===r.id?700:400,fontSize:14,color:st.disabled?"#aaa":"#333"}}>{st.disabled&&"🚫 "}{r.name}{r.favorite?" ⭐":""}</span>
                          {st.disabled && <span style={{display:"block",fontSize:10,color:"#e55",marginTop:1}}>재고 없음: {st.outOfStock.join(", ")}</span>}
                        </span>
                        {!st.disabled && <span style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2,flexShrink:0}}>
                          <span style={{fontSize:14,color:"#7a9",fontWeight:700}}>🧊{totalC}개</span>
                          {vol>0&&<span style={{fontSize:13,color:"#aaa",fontWeight:600}}>💧{vol}g</span>}
                        </span>}
                      </div>
                    </React.Fragment>);
                  })}
                </>);
              })()}
            </div>
          )}
        </div>
        {/* 식기 선택 - 레시피 기본값, 변경 가능 */}
        {selRec && (
          <div style={{marginBottom:12,position:"relative"}}>
            <div style={{fontSize:12,color:"#888",marginBottom:5}}>식기 <span style={{fontSize:10,color:"#aaa"}}>(레시피 기본값, 변경 가능)</span></div>
            <div onClick={()=>{setDdrop(o=>!o);setRdrop(false);}}
              style={{padding:"10px 14px",border:"1.5px solid #e8e8e8",borderRadius:12,cursor:"pointer",background:"#fafafa",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              {selDish ? (
                <span style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:16}}>{selDish.icon}</span>
                  <span style={{fontWeight:600,fontSize:13,color:"#333"}}>{selDish.name}</span>
                </span>
              ) : <span style={{color:"#bbb",fontSize:13}}>식기 없음</span>}
              <span style={{color:"#aaa"}}>{ddrop?"▲":"▼"}</span>
            </div>
            {ddrop && (
              <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:200,background:"#fff",border:"1.5px solid #e8e8e8",borderRadius:12,boxShadow:"0 8px 24px rgba(0,0,0,0.1)",overflow:"hidden",marginTop:4}}>
                {dishes.map(d=>(
                  <div key={d.id} onClick={e=>{e.stopPropagation();pickDish(d.id);}}
                    style={{padding:"10px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:10,
                      background:form.dishId===d.id?"#e8f8f0":"#fff",borderBottom:"1px solid #f5f5f5"}}>
                    <span style={{fontSize:18}}>{d.icon}</span>
                    <span style={{fontSize:13,fontWeight:form.dishId===d.id?700:400,color:"#333"}}>{d.name}</span>
                    <span style={{fontSize:11,color:"#aaa",marginLeft:"auto"}}>{d.slots.join(" · ")}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        <Field label="메모" value={form.memo} onChange={v=>setForm(f=>({...f,memo:v}))} placeholder="잘 먹음, 거부감 등..." />
        {/* 재료 준비 체크 */}
        {selRec && (
          <div style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontSize:12,color:"#888",fontWeight:600}}>재료 준비 체크</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                {selDish && selRec && (
                  <button onClick={()=>setEditSlots(v=>!v)}
                    style={{fontSize:11,padding:"2px 8px",borderRadius:8,border:"1px solid "+(editSlots?"#7BC67E":"#ddd"),
                      background:editSlots?"#e8f8f0":"#f9f9f9",color:editSlots?"#4a9":"#888",cursor:"pointer",fontWeight:editSlots?700:400}}>
                    {editSlots?"✓ 배치완료":"✏️ 이번만 수정"}
                  </button>
                )}
                {selDish && (
                <div style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#7a9"}}>
                  <span>{selDish.icon}</span><span>{selDish.name}</span>
                </div>
              )}
              </div>
            </div>
            {editSlots && selDish && selRec ? (
              // 이번만 슬롯 재배치 UI
              <div style={{marginBottom:8}}>
                <div style={{fontSize:11,color:"#7a9",marginBottom:6,padding:"4px 8px",background:"#e8f8f0",borderRadius:8}}>📌 재료를 각 칸에 재배치하세요 (이번 일정만 적용)</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat("+Math.min(selDish.slots.length,3)+",1fr)",gap:6}}>
                  {(()=>{
                    const tokens2 = ingredientsToTokens(selRec.ingredients);
                    const allSlotKeys2 = selDish.slots.flatMap(s=>form.slots[s]||[]);
                    return selDish.slots.map((slot,si)=>{
                      const slotKeys2 = form.slots[slot]||[];
                      return(
                        <div key={slot} style={{borderRadius:10,border:"2px solid "+SLOT_COLORS[si],background:"#fff",padding:"8px 6px"}}>
                          <div style={{fontSize:10,fontWeight:700,textAlign:"center",marginBottom:6,color:"#555",background:SLOT_COLORS[si],borderRadius:6,padding:"2px 4px"}}>{slot}</div>
                          {tokens2.map(tok=>{
                            const checked2 = slotKeys2.includes(tok.tokenKey);
                            const usedInOther = !checked2 && selDish.slots.filter(s=>s!==slot).some(s=>(form.slots[s]||[]).includes(tok.tokenKey));
                            const label2 = tokenLabel(tok.tokenKey, tokens2);
                            return(
                              <div key={tok.tokenKey}
                                onClick={()=>{
                                  if(usedInOther) return;
                                  setForm(f=>{
                                    const cur = f.slots[slot]||[];
                                    const next = cur.includes(tok.tokenKey)?cur.filter(x=>x!==tok.tokenKey):[...cur,tok.tokenKey];
                                    return {...f,slots:{...f.slots,[slot]:next}};
                                  });
                                }}
                                style={{display:"flex",alignItems:"center",gap:4,padding:"3px 4px",borderRadius:6,cursor:usedInOther?"not-allowed":"pointer",
                                  background:checked2?SLOT_COLORS[si]:"transparent",opacity:usedInOther?0.3:1,fontSize:11,color:"#444"}}>
                                <span style={{width:12,height:12,borderRadius:3,border:"1.5px solid "+(checked2?"#888":"#ccc"),background:checked2?"#fff":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                                  {checked2&&<span style={{fontSize:8,fontWeight:700}}>✓</span>}
                                </span>
                                {label2}
                              </div>
                            );
                          })}
                        </div>
                      );
                    });
                  })()}
                </div>
              </div>
            ) : selDish ? (
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {(()=>{
                  // tokenKey: "재료명__인덱스" 방식 - 동일 재료 여러 개 구분
                  const allSlotTokens = selDish.slots.flatMap(s=>form.slots[s]||[]);
                  const allSlotTokenObjs = allSlotTokens.map(tk=>({tokenKey:tk, ingName:tk.split("__g")[0]}));
                  return selDish.slots.map((slot,si)=>{
                    const slotTokens = form.slots[slot]||[];
                    // 이 칸에 배치된 토큰들을 재료 정보와 매핑
                    const tokensToShow = slotTokens.map(tk=>{
                      const ingName = tk.split("__g")[0];
                      const ing = selRec.ingredients.find(x=>x.name===ingName);
                      return ing ? {tokenKey:tk, ingName, ing} : null;
                    }).filter(Boolean);
                    if(tokensToShow.length===0) return null;
                    const allChecked = tokensToShow.every(t=>form.checked.includes(t.tokenKey));
                    return(
                      <div key={slot} style={{borderRadius:14,border:"2px solid "+SLOT_COLORS[si],background:"#fff",overflow:"hidden"}}>
                        <div style={{background:SLOT_COLORS[si],padding:"7px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <span style={{fontSize:12,fontWeight:700,color:"#555"}}>{slot}</span>
                          <span style={{fontSize:11,color:allChecked?"#4a9":"#aaa",fontWeight:600}}>
                            {tokensToShow.filter(t=>form.checked.includes(t.tokenKey)).length}/{tokensToShow.length} 준비완료
                          </span>
                        </div>
                        <div style={{padding:"8px 10px",display:"flex",flexDirection:"column",gap:5}}>
                          {tokensToShow.map(({tokenKey,ingName,ing})=>{
                            const chk = form.checked.includes(tokenKey);
                            const cube = cubes.find(c=>c.ingredient===ingName);
                            const g = cube&&cube.weightG>0 ? 1*cube.weightG : 0;
                            const label = tokenLabel(tokenKey, allSlotTokenObjs);
                            return(
                              <div key={tokenKey} onClick={()=>toggleCheck(tokenKey)}
                                style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"8px 10px",borderRadius:10,
                                  background:chk?selRec.color+"22":"#fafafa",border:"1.5px solid "+(chk?selRec.color:"#eee"),
                                  transition:"all 0.12s"}}>
                                <span style={{width:18,height:18,borderRadius:5,border:"2px solid "+(chk?selRec.color:"#ccc"),background:chk?selRec.color:"#fff",
                                  display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                                  {chk&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span>}
                                </span>
                                <span style={{flex:1,fontSize:13,color:chk?"#555":"#333",textDecoration:chk?"line-through":"none",fontWeight:chk?400:500}}>
                                  {label}
                                </span>
                                <span style={{fontSize:11,color:"#aaa",flexShrink:0}}>🧊1개{g>0?" · "+g+"g":""}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  });
                })()}
                {/* 칸 미배치 토큰 */}
                {(()=>{
                  // 전체 토큰 중 어떤 칸에도 배치 안 된 것
                  const allTokens = ingredientsToTokens(selRec.ingredients);
                  const allSlotTokens = selDish.slots.flatMap(s=>form.slots[s]||[]);
                  const unassignedTokens = allTokens.filter(t=>!allSlotTokens.includes(t.tokenKey));
                  if(unassignedTokens.length===0) return null;
                  const totalCount = selRec.ingredients.reduce((s,x)=>s+x.cubeCount,0);
                  return(
                    <div style={{borderRadius:14,border:"2px dashed #e0e0e0",background:"#fafafa",overflow:"hidden"}}>
                      <div style={{background:"#f0f0f0",padding:"7px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontSize:12,fontWeight:700,color:"#888"}}>기타 재료</span>
                        <span style={{fontSize:11,color:"#bbb"}}>{unassignedTokens.filter(t=>form.checked.includes(t.tokenKey)).length}/{unassignedTokens.length}</span>
                      </div>
                      <div style={{padding:"8px 10px",display:"flex",flexDirection:"column",gap:5}}>
                        {unassignedTokens.map(({tokenKey,ingName,ing})=>{
                          const chk = form.checked.includes(tokenKey);
                          const cube = cubes.find(c=>c.ingredient===ingName);
                          const g = cube&&cube.weightG>0 ? 1*cube.weightG : 0;
                          const allToks2 = ingredientsToTokens(selRec.ingredients);
                          const label = tokenLabel(tokenKey, allToks2);
                          return(
                            <div key={tokenKey} onClick={()=>toggleCheck(tokenKey)}
                              style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"8px 10px",borderRadius:10,
                                background:chk?selRec.color+"22":"#fff",border:"1.5px solid "+(chk?selRec.color:"#eee")}}>
                              <span style={{width:18,height:18,borderRadius:5,border:"2px solid "+(chk?selRec.color:"#ccc"),background:chk?selRec.color:"#fff",
                                display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                                {chk&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span>}
                              </span>
                              <span style={{flex:1,fontSize:13,color:chk?"#555":"#333",textDecoration:chk?"line-through":"none",fontWeight:chk?400:500}}>{label}</span>
                              <span style={{fontSize:11,color:"#aaa",flexShrink:0}}>🧊1개{g>0?" · "+g+"g":""}</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })()}
              </div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {ingredientsToTokens(selRec.ingredients).map(({tokenKey,ingName,ing})=>{
                  const chk = form.checked.includes(tokenKey);
                  const cube = cubes.find(c=>c.ingredient===ingName);
                  const g = cube&&cube.weightG>0 ? 1*cube.weightG : 0;
                  const allToks3 = ingredientsToTokens(selRec.ingredients);
                  const label = tokenLabel(tokenKey, allToks3);
                  return(
                    <div key={tokenKey} onClick={()=>toggleCheck(tokenKey)}
                      style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"8px 12px",borderRadius:12,
                        background:chk?selRec.color+"22":"#f9f9f9",border:"1.5px solid "+(chk?selRec.color:"#eee"),
                        transition:"all 0.12s"}}>
                      <span style={{width:18,height:18,borderRadius:5,border:"2px solid "+(chk?selRec.color:"#ccc"),background:chk?selRec.color:"#fff",
                        display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        {chk&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span>}
                      </span>
                      <span style={{flex:1,fontSize:13,color:chk?"#555":"#333",textDecoration:chk?"line-through":"none",fontWeight:chk?400:500}}>{label}</span>
                      <span style={{fontSize:11,color:"#aaa",flexShrink:0}}>🧊1개{g>0?" · "+g+"g":""}</span>
                    </div>
                  );
                })}
              </div>
            )}
            {/* 전체 진행률 */}
            {(()=>{
              const total = ingredientsToTokens(selRec.ingredients).length;
              const done = ingredientsToTokens(selRec.ingredients).filter(t=>form.checked.includes(t.tokenKey)).length;
              if(total===0) return null;
              const pct = Math.round(done/total*100);
              return(
                <div style={{marginTop:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#aaa",marginBottom:4}}>
                    <span>전체 진행</span>
                    <span style={{fontWeight:600,color:done===total?"#4a9":"#aaa"}}>{done}/{total} {done===total?"🎉 완료!":""}</span>
                  </div>
                  <div style={{background:"#f0f0f0",borderRadius:10,height:6}}>
                    <div style={{width:pct+"%",height:"100%",borderRadius:10,background:done===total?"#7BC67E":selRec.color,transition:"width 0.3s"}} />
                  </div>
                </div>
              );
            })()}
          </div>
        )}
        <Field label="먹은 양" value={form.amount} onChange={v=>setForm(f=>({...f,amount:v}))} placeholder="80ml, 반 그릇..." />
        <div style={{display:"flex",gap:8}}>
          {getEntry(target.date,target.meal) && (
            <PillBtn onClick={delEntry} color="#E78F8F" outline small>삭제</PillBtn>
          )}
          <div style={{flex:1}}>
            <PillBtn onClick={saveEntry} full disabled={!form.recipeId||(recipeStatus[form.recipeId]||{}).disabled}>저장</PillBtn>
          </div>
        </div>
      </Overlay>
    </div>
  );
}

// ────────────────────────────
// 큐브 탭
// ────────────────────────────
function CubeTab({ recipes, cubes, setCubes, stock, recipeStatus, categories, setCategories, makingIds=[], setMakingIds }) {
  const [modal, setModal] = useState(false);
  const [catModal, setCatModal] = useState(false);
  const [editId, setEditId] = useState(null);

  const [editCatId, setEditCatId] = useState(null);
  const [form, setForm] = useState({ingredient:"",count:"",madeDate:todayStr(),weightG:"",categoryId:""});
  const [catForm, setCatForm] = useState({name:"",color:"#C8F0C0"});
  const [search, setSearch] = useState("");
  const [filterTool, setFilterTool] = useState("");
  const [filterFav, setFilterFav] = useState(false);
  const [tagInput, setTagInput] = useState("");
  const [filterCat, setFilterCat] = useState("all");
  const [sortBy, setSortBy] = useState("stock_asc");

  const openNew = () => { setEditId(null); setForm({ingredient:"",count:"",madeDate:todayStr(),weightG:"",categoryId:""}); setModal(true); };
  const openEdit = c => { setEditId(c.id); setForm({ingredient:c.ingredient,count:"0",madeDate:c.madeDate,weightG:String(c.weightG||""),categoryId:c.categoryId||""}); setModal(true); };

  const saveCube = () => {
    if (!form.ingredient || form.count === "" || form.count === null) return;
    const entry = {ingredient:form.ingredient,count:Number(form.count),madeDate:form.madeDate,weightG:Number(form.weightG)||0,categoryId:form.categoryId,updatedAt:todayStr()};
    if (editId) {
      setCubes(cs=>cs.map(c=>c.id===editId?{...c,...entry,count:Math.max(0,c.count+entry.count)}:c));
    } else {
      const ex = cubes.find(c=>c.ingredient===form.ingredient);
      if (ex) {
        setCubes(cs=>cs.map(c=>c.ingredient===form.ingredient?{...c,count:c.count+entry.count,madeDate:entry.madeDate,weightG:entry.weightG||c.weightG,categoryId:entry.categoryId||c.categoryId,updatedAt:todayStr()}:c));
      } else {
        setCubes(cs=>[...cs,{id:uid(),...entry}]);
      }
    }
    setModal(false);
  };

  const openCatNew = () => { setEditCatId(null); setCatForm({name:"",color:"#C8F0C0"}); setCatModal(true); };
  const openCatEdit = cat => { setEditCatId(cat.id); setCatForm({name:cat.name,color:cat.color}); };
  const saveCat = () => {
    if (!catForm.name.trim()) return;
    if (editCatId) {
      setCategories(cs=>cs.map(c=>c.id===editCatId?{...c,...catForm}:c));
    } else {
      setCategories(cs=>[...cs,{id:uid(),...catForm}]);
    }
    setEditCatId(null);
    setCatForm({name:"",color:"#C8F0C0"});
  };

  const display = cubes
    .filter(c => {
      const ms = search.trim()===""||c.ingredient.includes(search.trim());
      const mc = filterCat==="all"||c.categoryId===filterCat||(!c.categoryId&&filterCat==="none");
      return ms && mc;
    })
    .sort((a,b) => {
      const ea=stock[a.ingredient]||0, eb=stock[b.ingredient]||0;
      if (sortBy==="stock_desc") return eb-ea;
      if (sortBy==="stock_asc")  return ea-eb;
      if (sortBy==="name_asc")   return a.ingredient.localeCompare(b.ingredient,"ko");
      if (sortBy==="name_desc")  return b.ingredient.localeCompare(a.ingredient,"ko");
      return ea-eb;
    });

  const empties = cubes.filter(c=>(stock[c.ingredient]||0)===0);
  const lows    = cubes.filter(c=>{const e=stock[c.ingredient]||0;return e>0&&e<5;});

  return(
    <div>
      {empties.length>0 && (
        <div style={{background:"#fff0f0",border:"1.5px solid #ffb3b3",borderRadius:14,padding:"12px 16px",marginBottom:10}}>
          <div style={{fontWeight:700,fontSize:13,color:"#c00",marginBottom:6}}>🚫 소진 ({empties.length}종) <span style={{fontSize:11,fontWeight:400,color:"#999"}}>탭하면 제조 중으로</span></div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {empties.map(c=>(
              <span key={c.id} onClick={()=>setMakingIds(p=>p.includes(c.id)?p:[...p,c.id])}
                style={{background:"#ffd6d6",borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:700,color:"#c00",cursor:"pointer",opacity:makingIds.includes(c.id)?0.4:1}}>
                {c.ingredient} 0개
              </span>
            ))}
          </div>
        </div>
      )}
      {lows.length>0 && (
        <div style={{background:"#fff3cd",border:"1.5px solid #ffc107",borderRadius:14,padding:"12px 16px",marginBottom:10}}>
          <div style={{fontWeight:700,fontSize:13,color:"#856404",marginBottom:6}}>⚠️ 부족 ({lows.length}종) <span style={{fontSize:11,fontWeight:400,color:"#999"}}>탭하면 제조 중으로</span></div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {lows.map(c=>(
              <span key={c.id} onClick={()=>setMakingIds(p=>p.includes(c.id)?p:[...p,c.id])}
                style={{background:"#ffe08a",borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:600,color:"#856404",cursor:"pointer",opacity:makingIds.includes(c.id)?0.4:1}}>
                {c.ingredient} {stock[c.ingredient]}개
              </span>
            ))}
          </div>
        </div>
      )}
      {makingIds.length>0 && (
        <div style={{background:"#e8f4fd",border:"1.5px solid #7BC9E8",borderRadius:14,padding:"12px 16px",marginBottom:10}}>
          <div style={{fontWeight:700,fontSize:13,color:"#1a6fa8",marginBottom:6}}>🍳 제조 중 ({makingIds.length}종) <span style={{fontSize:11,fontWeight:400,color:"#999"}}>탭하면 수정</span></div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {makingIds.map(id=>{
              const c = cubes.find(x=>x.id===id); if(!c) return null;
              return (
                <span key={id} onClick={()=>{
                  setEditId(c.id);
                  setForm({ingredient:c.ingredient,count:c.count,madeDate:c.madeDate,weightG:c.weightG,categoryId:c.categoryId||""});
                  setModal(true);
                  setMakingIds(p=>p.filter(x=>x!==id));
                }}
                  style={{background:"#b3e0f7",borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:700,color:"#1a6fa8",cursor:"pointer"}}>
                  {c.ingredient} {stock[c.ingredient]}개 ✏️
                </span>
              );
            })}
          </div>
        </div>
      )}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <span style={{fontWeight:700,fontSize:16,color:"#333"}}>큐브 재고 관리</span>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setCatModal(true)} style={{background:"#f0f0f0",border:"none",borderRadius:10,padding:"6px 10px",cursor:"pointer",fontSize:11,color:"#666"}}>📂 카테고리</button>
          <PillBtn onClick={openNew} small>+ 큐브 추가</PillBtn>
        </div>
      </div>
      {/* 검색 */}
      <div style={{position:"relative",marginBottom:10}}>
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:14,color:"#bbb"}}>🔍</span>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="재료명 검색..."
          style={{width:"100%",padding:"9px 12px 9px 34px",border:"1.5px solid #e8e8e8",borderRadius:12,fontSize:13,outline:"none",background:"#fafafa",boxSizing:"border-box"}} />
        {search && <button onClick={()=>setSearch("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"#bbb",fontSize:14}}>✕</button>}
      </div>
      {/* 카테고리 필터 */}
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:10}}>
        <button onClick={()=>setFilterCat("all")} style={{padding:"4px 10px",borderRadius:20,cursor:"pointer",fontSize:11,fontWeight:filterCat==="all"?700:400,border:"1.5px solid "+(filterCat==="all"?"#7BC67E":"#e0e0e0"),background:filterCat==="all"?"#7BC67E22":"#fff",color:filterCat==="all"?"#4a9":"#888"}}>전체</button>
        {categories.map(cat => (
          <button key={cat.id} onClick={()=>setFilterCat(filterCat===cat.id?"all":cat.id)}
            style={{padding:"4px 10px",borderRadius:20,cursor:"pointer",fontSize:11,fontWeight:filterCat===cat.id?700:400,border:"1.5px solid "+(filterCat===cat.id?"#555":"#e0e0e0"),background:filterCat===cat.id?cat.color:cat.color+"55",color:"#444"}}>
            {cat.name}
          </button>
        ))}
      </div>
      <SortBar value={sortBy} onChange={setSortBy}
        options={[["stock_asc","재고 적은순"],["stock_desc","재고 많은순"],["name_asc","가나다순"],["name_desc","가나다 역순"]]} />
      {display.length===0 && <div style={{textAlign:"center",padding:32,color:"#bbb",fontSize:13}}>{search?"검색 결과 없음 🔍":"큐브를 추가해보세요 🧊"}</div>}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {display.map(c => {
          const eff = stock[c.ingredient]||0;
          const isEmpty = eff===0;
          const isLow = !isEmpty&&eff<5;
          const pct = Math.min(100,(eff/Math.max(c.count,1))*100);
          const blocked = recipes.filter(r=>(recipeStatus[r.id]||{outOfStock:[]}).outOfStock.includes(c.ingredient));
          const cat = categories.find(x=>x.id===c.categoryId);
          return(
            <div key={c.id} style={{background:isEmpty?"#fff5f5":"#fff",borderRadius:16,padding:"14px 16px",border:"1.5px solid "+(isEmpty?"#ffb3b3":isLow?"#ffc107":"#f0f0f0"),boxShadow:"0 2px 10px rgba(0,0,0,0.04)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                    <span style={{fontWeight:700,fontSize:15,color:isEmpty?"#c00":"#333"}}>{c.ingredient}</span>
                    {isEmpty && <span style={{fontSize:11,background:"#e55",color:"#fff",borderRadius:10,padding:"1px 7px",fontWeight:700}}>소진</span>}
                    {isLow && <span style={{fontSize:11,color:"#e68",fontWeight:700}}>⚠️ 부족</span>}
                    {cat && <span style={{fontSize:10,background:cat.color,borderRadius:10,padding:"1px 8px",color:"#555",fontWeight:600}}>{cat.name}</span>}
                  </div>
                  {c.weightG>0 && <span style={{fontSize:11,color:"#777",background:"#f5f5f5",borderRadius:10,padding:"1px 8px",marginTop:4,display:"inline-block"}}>1개 = {c.weightG}g</span>}
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontWeight:800,fontSize:18,color:isEmpty?"#e55":isLow?"#e68":"#7BC67E",lineHeight:1}}>{eff}</div>
                    <div style={{fontSize:10,color:"#bbb"}}>/ {c.count}개</div>
                  </div>
                  <button onClick={()=>openEdit(c)} style={{background:"#f5f5f5",border:"none",borderRadius:8,padding:"3px 8px",cursor:"pointer",fontSize:11,color:"#666"}}>수정</button>
                  <button onClick={()=>setCubes(cs=>cs.filter(x=>x.id!==c.id))} style={{background:"#ffeaea",border:"none",borderRadius:8,padding:"3px 8px",cursor:"pointer",fontSize:11,color:"#e87"}}>삭제</button>
                </div>
              </div>
              <div style={{background:"#f0f0f0",borderRadius:10,height:6,marginBottom:6}}>
                <div style={{width:pct+"%",height:"100%",borderRadius:10,background:isEmpty?"#e55":isLow?"#ffc107":"#7BC67E"}} />
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#aaa"}}>
                <span>제조일: {c.madeDate}{c.updatedAt&&c.updatedAt!==c.madeDate?<span style={{marginLeft:6}}>✏️ {c.updatedAt}</span>:null}</span>
                {c.weightG>0&&eff>0 && <span style={{color:"#4a9",fontWeight:600}}>잔여 {eff*c.weightG}g</span>}
              </div>
              {isEmpty&&blocked.length>0 && (
                <div style={{marginTop:8,background:"#fff0f0",borderRadius:8,padding:"5px 10px",fontSize:11,color:"#e55"}}>
                  🚫 비활성 레시피: <strong>{blocked.map(r=>r.name).join(", ")}</strong>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {/* 레시피별 현황 */}
      {recipes.length>0 && (
        <div style={{marginTop:24}}>
          <div style={{fontWeight:700,fontSize:14,color:"#555",marginBottom:12}}>레시피별 재료 현황</div>
          {recipes.map(r => {
            const vol = cubeVolume(r,cubes);
            const hasE = r.ingredients.some(ing=>{const reg=cubes.find(c=>c.ingredient===ing.name);return reg&&(stock[ing.name]||0)===0;});
            return(
              <div key={r.id} style={{background:hasE?"#fff5f5":r.color+"12",borderLeft:"3px solid "+(hasE?"#e55":r.color),borderRadius:12,padding:"10px 14px",marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontWeight:700,fontSize:13,color:hasE?"#c00":"#444"}}>{hasE&&"🚫 "}{r.name}</span>
                  {hasE?<span style={{fontSize:11,color:"#e55",fontWeight:700}}>사용 불가</span>:vol>0&&<span style={{fontSize:11,color:"#4a9",fontWeight:600}}>{vol}g</span>}
                </div>
                <div>
                  {r.ingredients.map(ing => {
                    const eff2 = stock[ing.name];
                    const reg = cubes.find(c=>c.ingredient===ing.name);
                    const e2 = reg&&eff2===0;
                    return(
                      <span key={ing.name} style={{display:"inline-flex",alignItems:"center",gap:4,background:e2?"#fff0f0":"#fff",border:"1px solid "+(e2?"#ffb3b3":r.color+"55"),borderRadius:20,padding:"2px 10px",marginRight:6,marginBottom:4,fontSize:11,color:"#555"}}>
                        {e2&&"⚠️ "}{ing.name} x{ing.cubeCount}
                        {eff2!=null?<span style={{fontWeight:700,color:e2?"#e55":eff2<5?"#e68":"#7BC67E"}}>재고 {eff2}개</span>:<span style={{color:"#ccc"}}>미등록</span>}
                      </span>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* 큐브 추가/수정 모달 */}
      <Overlay open={modal} onClose={()=>setModal(false)} title={editId?"큐브 수정 (추가 수량 입력)":"큐브 추가"}>
        {editId && (()=>{
          const cur = cubes.find(c=>c.id===editId);
          return cur ? <div style={{background:"#e8f8f0",border:"1px solid #7BC67E55",borderRadius:10,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#4a9"}}>
            현재 재고: <strong>{cur.count}개</strong> → 추가는 양수, 감소는 음수로 입력하면 합산돼요
          </div> : null;
        })()}
        <Field label="재료명" value={form.ingredient} onChange={v=>setForm(f=>({...f,ingredient:v}))} placeholder="단호박" />
        <div style={{marginBottom:12}}>
          <div style={{fontSize:12,color:"#888",marginBottom:6}}>카테고리</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            <div onClick={()=>setForm(f=>({...f,categoryId:""}))}
              style={{padding:"4px 12px",borderRadius:20,cursor:"pointer",fontSize:12,color:"#666",fontWeight:!form.categoryId?700:400,background:!form.categoryId?"#7BC67E22":"#f5f5f5",border:"1.5px solid "+(!form.categoryId?"#7BC67E":"transparent")}}>
              미분류
            </div>
            {categories.map(cat => (
              <div key={cat.id} onClick={()=>setForm(f=>({...f,categoryId:cat.id}))}
                style={{padding:"4px 12px",borderRadius:20,cursor:"pointer",fontSize:12,color:"#444",fontWeight:form.categoryId===cat.id?700:400,background:form.categoryId===cat.id?cat.color:cat.color+"55",border:"1.5px solid "+(form.categoryId===cat.id?"#555":"transparent")}}>
                {cat.name}
              </div>
            ))}
          </div>
        </div>
        <Field label={editId?"추가/감소 수량":"제조 개수"} value={form.count} onChange={v=>setForm(f=>({...f,count:v}))} placeholder={editId?"양수=추가, 음수=감소":"30"} type="number" />
        <Field label="큐브 1개 무게(g)" value={form.weightG} onChange={v=>setForm(f=>({...f,weightG:v}))} placeholder="15" type="number" />
        <Field label="제조일" value={form.madeDate} onChange={v=>setForm(f=>({...f,madeDate:v}))} type="date" />
        <PillBtn onClick={saveCube} full disabled={!form.ingredient||!form.count}>저장</PillBtn>
      </Overlay>

      {/* 카테고리 관리 모달 */}
      <Overlay open={catModal} onClose={()=>{setCatModal(false);setEditCatId(null);setCatForm({name:"",color:"#C8F0C0"});}} title="카테고리 관리">
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,color:"#888",marginBottom:8}}>현재 카테고리</div>
          {categories.map(cat => (
            <div key={cat.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,padding:"8px 12px",background:cat.color+"55",borderRadius:12}}>
              <span style={{flex:1,fontSize:13,fontWeight:600,color:"#444"}}>{cat.name}</span>
              <button onClick={()=>openCatEdit(cat)} style={{background:"#f5f5f5",border:"none",borderRadius:8,padding:"3px 8px",cursor:"pointer",fontSize:11,color:"#666"}}>수정</button>
              <button onClick={()=>setCategories(cs=>cs.filter(x=>x.id!==cat.id))} style={{background:"#ffeaea",border:"none",borderRadius:8,padding:"3px 8px",cursor:"pointer",fontSize:11,color:"#e87"}}>삭제</button>
            </div>
          ))}
        </div>
        <div style={{background:"#f9f9f9",borderRadius:14,padding:14}}>
          <div style={{fontSize:12,color:"#888",marginBottom:8,fontWeight:600}}>{editCatId?"카테고리 수정":"새 카테고리 추가"}</div>
          <Field value={catForm.name} onChange={v=>setCatForm(f=>({...f,name:v}))} placeholder="카테고리 이름..." />
