name: Update Blog Posts

on:
  workflow_dispatch:
  repository_dispatch:
    types: [blog-updated]

jobs:
  update-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Generate blog-posts.js
        run: |
          node -e "
          const https = require('https');
          const fs = require('fs');
          https.get('https://ednpapa.co.kr/feed', (res) => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', () => {
              const items = [];
              const matches = data.match(/<item>([\s\S]*?)<\/item>/g) || [];
              matches.slice(0, 20).forEach(item => {
                const title = (item.match(/<title><!\[CDATA\[(.*?)\]\]><\/title>/) || item.match(/<title>(.*?)<\/title>/))?.[1] || '';
                const link = (item.match(/<link>(.*?)<\/link>/) || [])[1] || '';
                const pubDate = (item.match(/<pubDate>(.*?)<\/pubDate>/) || [])[1] || '';
                const desc = (item.match(/<description><!\[CDATA\[(.*?)\]\]><\/description>/) || [])[1] || '';
                const cats = [...item.matchAll(/<category><!\[CDATA\[(.*?)\]\]><\/category>/g)].map(m => m[1]);
                const d = new Date(pubDate);
                const dateStr = isNaN(d) ? '' : d.toISOString().slice(0,10);
                const cleanDesc = desc.replace(/<[^>]+>/g, '').trim().slice(0, 100);
                const validCats = ['이유식','육아','건강','레시피','성장'];
                const category = cats.find(c => validCats.includes(c)) || cats[0] || '육아';
                if (title && link) items.push({ title, url: link, date: dateStr, category, desc: cleanDesc });
              });
              const out = 'window.BLOG_POSTS = ' + JSON.stringify(items, null, 2) + ';';
              fs.writeFileSync('js/blog-posts.js', out);
              console.log(items.length + ' posts written');
            });
          }).on('error', e => { console.error(e.message); process.exit(1); });
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/blog-posts.js
          git diff --staged --quiet || git commit -m "auto update blog posts"
          git push
