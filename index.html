async function dbGet(key, uid) {
  try {
    const userId = uid || (firebase.auth().currentUser && firebase.auth().currentUser.uid);
    if (!userId) return null;
    const doc = await firebase.firestore().collection("users").doc(userId).collection("data").doc(key).get();
    if (!doc.exists) return null;
    const val = doc.data().value;
    if (typeof val === "string") {
      try { return JSON.parse(val); } catch(e) { return val; }
    }
    return val;
  } catch(e) { console.error("dbGet error:", e); return null; }
}
async function dbSet(key, val, uid) {
  try {
    const userId = uid || (firebase.auth().currentUser && firebase.auth().currentUser.uid);
    if (!userId) { console.warn("dbSet: userId 없음!"); return; }
    const toStore = (typeof val === "object") ? JSON.stringify(val) : val;
    await firebase.firestore().collection("users").doc(userId).collection("data").doc(key).set({ value: toStore });
  } catch(e) { console.error("dbSet error:", e); }
}
async function dbGetLocal(key) { return dbGet(key); }

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;

function LoginScreen() {
  const [loading, setLoading] = useState(false);
  const signIn = async () => {
    setLoading(true);
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      await auth.signInWithPopup(provider);
    } catch(e) {
      alert("로그인 실패: " + e.message);
      setLoading(false);
    }
  };
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"linear-gradient(135deg,#7BC67E,#5BAD5E)",padding:24}}>

      <button onClick={signIn} disabled={loading}
        style={{display:"flex",alignItems:"center",gap:10,background:"#fff",border:"none",borderRadius:16,padding:"14px 28px",fontSize:15,fontWeight:700,cursor:loading?"not-allowed":"pointer",opacity:loading?0.7:1,boxShadow:"0 4px 20px rgba(0,0,0,0.15)"}}>

        {loading ? "로그인 중..." : "Google로 시작하기"}
      </button>
    </div>
  );
}
